name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --extra dev --locked
      - run: uv run pytest -q
      - run: uv run ruff check .
      - run: DATABASE_URL=sqlite+pysqlite:////tmp/knowledgehub-ci.db uv run alembic upgrade head
      - run: DATABASE_URL=sqlite+pysqlite:////tmp/knowledgehub-ci.db uv run alembic downgrade 0005_chunk_embedding_metadata
      - run: DATABASE_URL=sqlite+pysqlite:////tmp/knowledgehub-ci.db uv run alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
