services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-KnowledgeHub AI}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_VERSION: ${APP_VERSION:-0.8.0}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1,testserver}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://enterprise_rag:change-me-before-production@db:5432/enterprise_rag}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_FAIL_OPEN: ${RATE_LIMIT_FAIL_OPEN:-true}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_RATE_LIMIT: ${AUTH_RATE_LIMIT:-10}
      UPLOAD_RATE_LIMIT: ${UPLOAD_RATE_LIMIT:-10}
      SEARCH_RATE_LIMIT: ${SEARCH_RATE_LIMIT:-60}
      RAG_RATE_LIMIT: ${RAG_RATE_LIMIT:-20}
      STREAM_RATE_LIMIT: ${STREAM_RATE_LIMIT:-20}
      DEPENDENCY_HEALTH_TIMEOUT_SECONDS: ${DEPENDENCY_HEALTH_TIMEOUT_SECONDS:-2}
      DOCUMENT_STORAGE_PATH: ${DOCUMENT_STORAGE_PATH:-/data/documents}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-150}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
      MILVUS_TOKEN: ${MILVUS_TOKEN:-}
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-knowledgehub_chunks}
      MILVUS_METRIC_TYPE: ${MILVUS_METRIC_TYPE:-COSINE}
      MILVUS_INDEX_TYPE: ${MILVUS_INDEX_TYPE:-HNSW}
      MILVUS_HNSW_M: ${MILVUS_HNSW_M:-16}
      MILVUS_HNSW_EF_CONSTRUCTION: ${MILVUS_HNSW_EF_CONSTRUCTION:-200}
      SEARCH_DEFAULT_TOP_K: ${SEARCH_DEFAULT_TOP_K:-5}
      SEARCH_MAX_TOP_K: ${SEARCH_MAX_TOP_K:-20}
      SEARCH_SCORE_THRESHOLD: ${SEARCH_SCORE_THRESHOLD:-0.0}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      LLM_MAX_CONTEXT_CHUNKS: ${LLM_MAX_CONTEXT_CHUNKS:-8}
      LLM_REQUEST_TIMEOUT_SECONDS: ${LLM_REQUEST_TIMEOUT_SECONDS:-60}
      RAG_MAX_QUERY_LENGTH: ${RAG_MAX_QUERY_LENGTH:-2000}
      RAG_MAX_CONTEXT_CHARACTERS: ${RAG_MAX_CONTEXT_CHARACTERS:-24000}
      RAG_CITATION_EXCERPT_LENGTH: ${RAG_CITATION_EXCERPT_LENGTH:-300}
      CONVERSATION_HISTORY_MAX_MESSAGES: ${CONVERSATION_HISTORY_MAX_MESSAGES:-8}
      CONVERSATION_HISTORY_MAX_CHARACTERS: ${CONVERSATION_HISTORY_MAX_CHARACTERS:-12000}
      CONVERSATION_TITLE_MAX_LENGTH: ${CONVERSATION_TITLE_MAX_LENGTH:-120}
      CONVERSATION_PAGE_SIZE_DEFAULT: ${CONVERSATION_PAGE_SIZE_DEFAULT:-20}
      CONVERSATION_PAGE_SIZE_MAX: ${CONVERSATION_PAGE_SIZE_MAX:-100}
      MESSAGE_MAX_LENGTH: ${MESSAGE_MAX_LENGTH:-4000}
      STREAM_HEARTBEAT_SECONDS: ${STREAM_HEARTBEAT_SECONDS:-15}
    volumes:
      - document_storage:/data/documents
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/live')"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    networks: [backend]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_rag}
      POSTGRES_USER: ${POSTGRES_USER:-enterprise_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >-
      etcd --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - milvus_etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin-change-before-production}
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - milvus_minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  milvus:
    image: milvusdb/milvus:v2.5.27
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks: [backend]

  ollama:
    image: ollama/ollama:0.6.5
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    networks: [backend]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [backend]

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8000}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [backend]

volumes:
  postgres_data:
  redis_data:
  document_storage:
  milvus_etcd_data:
  milvus_minio_data:
  milvus_data:
  ollama_data:

networks:
  backend:
    driver: bridge
