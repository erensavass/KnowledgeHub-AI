services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-Enterprise RAG Assistant}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://enterprise_rag:change-me-before-production@db:5432/enterprise_rag}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DOCUMENT_STORAGE_PATH: ${DOCUMENT_STORAGE_PATH:-/data/documents}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
    volumes:
      - document_storage:/data/documents
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [backend]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_rag}
      POSTGRES_USER: ${POSTGRES_USER:-enterprise_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-before-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: [backend]

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      - api
    ports:
      - "${HTTP_PORT:-8000}:80"
    restart: unless-stopped
    networks: [backend]

volumes:
  postgres_data:
  redis_data:
  document_storage:

networks:
  backend:
    driver: bridge
